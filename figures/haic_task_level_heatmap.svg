<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="1120" viewBox="0 0 1680 1120" role="img" aria-labelledby="title desc">
  <title id="title">HAIC task-readiness matrix for public ultrasound resources</title>
  <desc id="desc">A qualitative matrix mapping common ultrasound dataset task families to five increasing human-AI collaboration levels from passive AI assistance to co-adaptive workflow.</desc>
  <defs>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#b8c5d3" flood-opacity="0.28"/>
    </filter>
    <style>
      .page { fill: #f6fafc; }
      .panel { fill: #ffffff; stroke: #cfdae5; stroke-width: 2; }
      .tableFrame { fill: #ffffff; stroke: #b9cad8; stroke-width: 2.2; }
      .head { fill: #edf7fc; stroke: #c7d9e6; stroke-width: 1.3; }
      .cell { stroke: #d5e2ec; stroke-width: 1.2; }
      .nativeBg { fill: #e3f6ed; }
      .deriveBg { fill: #e8f4fb; }
      .limitedBg { fill: #fff1c9; }
      .scarceBg { fill: #edf3f7; }
      .title { font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif; font-weight: 800; font-size: 38px; fill: #172332; letter-spacing: 0; }
      .subtitle { font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif; font-size: 18px; fill: #4e6274; }
      .axis { font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif; font-weight: 800; font-size: 18px; fill: #162434; }
      .axisSmall { font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif; font-size: 13px; fill: #536879; }
      .colText { font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif; font-weight: 800; font-size: 15px; fill: #142231; }
      .legendCard { fill: #ffffff; stroke: #d4e0ea; stroke-width: 1.5; }
      .legendTitle { font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif; font-weight: 800; font-size: 18px; fill: #172332; }
      .legendName { font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif; font-weight: 800; font-size: 15px; fill: #192b3a; }
      .legendText { font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif; font-size: 13px; fill: #3b4f61; }
      .note { font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif; font-size: 14px; fill: #536879; }
      .nativeIcon { fill: #22a879; }
      .deriveIcon { fill: #3a92cf; }
      .limitedIcon { fill: #df9f24; }
      .scarceIcon { fill: #9fb0bf; }
      .whiteStroke { fill: none; stroke: #ffffff; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; }
      .whiteStrokeThin { fill: none; stroke: #ffffff; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .whiteDash { fill: none; stroke: #ffffff; stroke-width: 6; stroke-linecap: round; }
    </style>
    <g id="nativeSymbol">
      <circle class="nativeIcon" cx="0" cy="0" r="26"/>
      <path class="whiteStroke" d="M -12 -1 L -4 9 L 15 -13"/>
    </g>
    <g id="deriveSymbol">
      <circle class="deriveIcon" cx="0" cy="0" r="26"/>
      <path class="whiteStrokeThin" d="M -13 4 C -7 16 12 15 16 1"/>
      <path class="whiteStrokeThin" d="M 16 1 L 17 13"/>
      <path class="whiteStrokeThin" d="M 16 1 L 4 3"/>
    </g>
    <g id="limitedSymbol">
      <path class="limitedIcon" d="M 0 -29 L 29 24 L -29 24 Z"/>
      <path class="whiteStrokeThin" d="M 0 -10 L 0 8"/>
      <circle fill="#ffffff" cx="0" cy="17" r="3.3"/>
    </g>
    <g id="scarceSymbol">
      <circle class="scarceIcon" cx="0" cy="0" r="26"/>
      <path class="whiteDash" d="M -14 0 L 14 0"/>
    </g>
  </defs>

  <rect class="page" x="0" y="0" width="1680" height="1120"/>
  <rect class="panel" x="42" y="34" width="1596" height="1038" rx="28" filter="url(#softShadow)"/>

  <text class="title" x="840" y="92" text-anchor="middle">HAIC Task-Readiness Matrix for Public Ultrasound Resources</text>
  <text class="subtitle" x="840" y="126" text-anchor="middle">Basic ultrasound dataset tasks are mapped to increasing levels of human-AI collaboration.</text>

  <!-- Layout constants: x0=360, y0=198, cw=198, ch=92 -->

  <rect class="tableFrame" x="360" y="198" width="1188" height="460" rx="10"/>

  <!-- Column headers -->
  <g>
    <rect class="head" x="360" y="150" width="198" height="48" rx="8"/>
    <rect class="head" x="558" y="150" width="198" height="48" rx="8"/>
    <rect class="head" x="756" y="150" width="198" height="48" rx="8"/>
    <rect class="head" x="954" y="150" width="198" height="48" rx="8"/>
    <rect class="head" x="1152" y="150" width="198" height="48" rx="8"/>
    <rect class="head" x="1350" y="150" width="198" height="48" rx="8"/>

    <text class="colText" x="459" y="168" text-anchor="middle"><tspan x="459" dy="0">Recognition /</tspan><tspan x="459" dy="18">classification</tspan></text>
    <text class="colText" x="657" y="168" text-anchor="middle"><tspan x="657" dy="0">Segmentation /</tspan><tspan x="657" dy="18">localization</tspan></text>
    <text class="colText" x="855" y="168" text-anchor="middle"><tspan x="855" dy="0">Measurement /</tspan><tspan x="855" dy="18">quantification</tspan></text>
    <text class="colText" x="1053" y="168" text-anchor="middle"><tspan x="1053" dy="0">Quality /</tspan><tspan x="1053" dy="18">acquisition</tspan></text>
    <text class="colText" x="1251" y="168" text-anchor="middle"><tspan x="1251" dy="0">Report / VQA /</tspan><tspan x="1251" dy="18">reasoning</tspan></text>
    <text class="colText" x="1449" y="168" text-anchor="middle"><tspan x="1449" dy="0">Reconstruction /</tspan><tspan x="1449" dy="18">registration</tspan></text>
  </g>

  <!-- Row labels -->
  <g>
    <text class="axis" x="330" y="232" text-anchor="end">L1 Passive AI assistance</text>
    <text class="axisSmall" x="330" y="254" text-anchor="end">AI outputs, human observes</text>
    <text class="axis" x="330" y="324" text-anchor="end">L2 Human review / correction</text>
    <text class="axisSmall" x="330" y="346" text-anchor="end">human checks and edits AI</text>
    <text class="axis" x="330" y="416" text-anchor="end">L3 Selective collaboration</text>
    <text class="axisSmall" x="330" y="438" text-anchor="end">AI asks or defers to humans</text>
    <text class="axis" x="330" y="508" text-anchor="end">L4 Interactive guidance</text>
    <text class="axisSmall" x="330" y="530" text-anchor="end">AI guides human action</text>
    <text class="axis" x="330" y="600" text-anchor="end">L5 Co-adaptive workflow</text>
    <text class="axisSmall" x="330" y="622" text-anchor="end">closed-loop human-AI process</text>
  </g>

  <!-- Cells -->
  <g>
    <!-- L1 Native -->
    <rect class="cell nativeBg" x="360" y="198" width="198" height="92"/><rect class="cell nativeBg" x="558" y="198" width="198" height="92"/><rect class="cell nativeBg" x="756" y="198" width="198" height="92"/><rect class="cell nativeBg" x="954" y="198" width="198" height="92"/><rect class="cell nativeBg" x="1152" y="198" width="198" height="92"/><rect class="cell nativeBg" x="1350" y="198" width="198" height="92"/>
    <!-- L2 -->
    <rect class="cell deriveBg" x="360" y="290" width="198" height="92"/><rect class="cell deriveBg" x="558" y="290" width="198" height="92"/><rect class="cell deriveBg" x="756" y="290" width="198" height="92"/><rect class="cell deriveBg" x="954" y="290" width="198" height="92"/><rect class="cell deriveBg" x="1152" y="290" width="198" height="92"/><rect class="cell limitedBg" x="1350" y="290" width="198" height="92"/>
    <!-- L3 -->
    <rect class="cell deriveBg" x="360" y="382" width="198" height="92"/><rect class="cell deriveBg" x="558" y="382" width="198" height="92"/><rect class="cell deriveBg" x="756" y="382" width="198" height="92"/><rect class="cell deriveBg" x="954" y="382" width="198" height="92"/><rect class="cell deriveBg" x="1152" y="382" width="198" height="92"/><rect class="cell limitedBg" x="1350" y="382" width="198" height="92"/>
    <!-- L4 -->
    <rect class="cell limitedBg" x="360" y="474" width="198" height="92"/><rect class="cell limitedBg" x="558" y="474" width="198" height="92"/><rect class="cell limitedBg" x="756" y="474" width="198" height="92"/><rect class="cell deriveBg" x="954" y="474" width="198" height="92"/><rect class="cell limitedBg" x="1152" y="474" width="198" height="92"/><rect class="cell limitedBg" x="1350" y="474" width="198" height="92"/>
    <!-- L5 -->
    <rect class="cell scarceBg" x="360" y="566" width="198" height="92"/><rect class="cell scarceBg" x="558" y="566" width="198" height="92"/><rect class="cell scarceBg" x="756" y="566" width="198" height="92"/><rect class="cell scarceBg" x="954" y="566" width="198" height="92"/><rect class="cell scarceBg" x="1152" y="566" width="198" height="92"/><rect class="cell scarceBg" x="1350" y="566" width="198" height="92"/>
  </g>

  <!-- Icons -->
  <g>
    <!-- L1 -->
    <use href="#nativeSymbol" x="459" y="244"/><use href="#nativeSymbol" x="657" y="244"/><use href="#nativeSymbol" x="855" y="244"/><use href="#nativeSymbol" x="1053" y="244"/><use href="#nativeSymbol" x="1251" y="244"/><use href="#nativeSymbol" x="1449" y="244"/>
    <!-- L2 -->
    <use href="#deriveSymbol" x="459" y="336"/><use href="#deriveSymbol" x="657" y="336"/><use href="#deriveSymbol" x="855" y="336"/><use href="#deriveSymbol" x="1053" y="336"/><use href="#deriveSymbol" x="1251" y="336"/><use href="#limitedSymbol" x="1449" y="336"/>
    <!-- L3 -->
    <use href="#deriveSymbol" x="459" y="428"/><use href="#deriveSymbol" x="657" y="428"/><use href="#deriveSymbol" x="855" y="428"/><use href="#deriveSymbol" x="1053" y="428"/><use href="#deriveSymbol" x="1251" y="428"/><use href="#limitedSymbol" x="1449" y="428"/>
    <!-- L4 -->
    <use href="#limitedSymbol" x="459" y="520"/><use href="#limitedSymbol" x="657" y="520"/><use href="#limitedSymbol" x="855" y="520"/><use href="#deriveSymbol" x="1053" y="520"/><use href="#limitedSymbol" x="1251" y="520"/><use href="#limitedSymbol" x="1449" y="520"/>
    <!-- L5 -->
    <use href="#scarceSymbol" x="459" y="612"/><use href="#scarceSymbol" x="657" y="612"/><use href="#scarceSymbol" x="855" y="612"/><use href="#scarceSymbol" x="1053" y="612"/><use href="#scarceSymbol" x="1251" y="612"/><use href="#scarceSymbol" x="1449" y="612"/>
  </g>

  <!-- Legend cards -->
  <text class="legendTitle" x="190" y="728">Support code</text>
  <g>
    <rect class="legendCard" x="190" y="752" width="600" height="86" rx="16"/>
    <g transform="translate(230,795) scale(0.82)"><use href="#nativeSymbol"/></g>
    <text class="legendName" x="268" y="786">Native</text>
    <text class="legendText" x="268" y="810"><tspan x="268" dy="0">Directly supported by the original dataset task.</tspan></text>

    <rect class="legendCard" x="850" y="752" width="600" height="86" rx="16"/>
    <g transform="translate(890,795) scale(0.82)"><use href="#deriveSymbol"/></g>
    <text class="legendName" x="928" y="786">Derivable</text>
    <text class="legendText" x="928" y="810"><tspan x="928" dy="0">Can be constructed with model predictions, uncertainty,</tspan><tspan x="928" dy="18">human review protocol, or extra processing.</tspan></text>

    <rect class="legendCard" x="190" y="858" width="600" height="86" rx="16"/>
    <g transform="translate(230,901) scale(0.82)"><use href="#limitedSymbol"/></g>
    <text class="legendName" x="268" y="892">Limited</text>
    <text class="legendText" x="268" y="916"><tspan x="268" dy="0">Only indirect support because interaction or workflow</tspan><tspan x="268" dy="18">signals are missing.</tspan></text>

    <rect class="legendCard" x="850" y="858" width="600" height="86" rx="16"/>
    <g transform="translate(890,901) scale(0.82)"><use href="#scarceSymbol"/></g>
    <text class="legendName" x="928" y="892">Scarce</text>
    <text class="legendText" x="928" y="916"><tspan x="928" dy="0">Rarely supported by current public ultrasound resources.</tspan></text>
  </g>

  <text class="note" x="840" y="1004" text-anchor="middle">Draft framework matrix: cells summarize task-readiness patterns, not individual dataset quality.</text>
</svg>
