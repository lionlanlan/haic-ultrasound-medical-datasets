<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="980" viewBox="0 0 1800 980" role="img" aria-labelledby="title desc">
  <title id="title">HAIC-oriented matrix map of public ultrasound dataset resources</title>
  <desc id="desc">A matrix map organizing ready public ultrasound datasets by clinical domain and by the type of human-AI collaboration signal they support.</desc>
  <defs>
    <style>
      .title { font: 700 30px Arial, Helvetica, sans-serif; fill: #172026; }
      .subtitle { font: 400 16px Arial, Helvetica, sans-serif; fill: #53616d; }
      .domain { font: 700 16px Arial, Helvetica, sans-serif; fill: #172026; }
      .row-title { font: 700 16px Arial, Helvetica, sans-serif; fill: #172026; }
      .row-desc { font: 400 13px Arial, Helvetica, sans-serif; fill: #66727c; }
      .cell { fill: #ffffff; stroke: #dbe4ea; stroke-width: 1; }
      .cell-alt { fill: #f6fafb; stroke: #dbe4ea; stroke-width: 1; }
      .chip { rx: 15; ry: 15; stroke: #ffffff; stroke-width: 1.5; }
      .chip-text { font: 700 15px Arial, Helvetica, sans-serif; fill: #172026; }
      .small { font: 400 14px Arial, Helvetica, sans-serif; fill: #53616d; }
      .legend-title { font: 700 14px Arial, Helvetica, sans-serif; fill: #172026; }
      .legend { font: 400 13px Arial, Helvetica, sans-serif; fill: #34444f; }
      .gap { rx: 15; ry: 15; fill: #fff4cf; stroke: #e1b84d; stroke-width: 1.5; }
      .gap-text { font: 700 14px Arial, Helvetica, sans-serif; fill: #7a5c00; }
    </style>
  </defs>

  <rect width="1800" height="980" fill="#ffffff"/>
  <rect x="34" y="34" width="1732" height="900" rx="22" fill="#f8fbfc" stroke="#dfe8ee"/>

  <text x="74" y="82" class="title">HAIC-Oriented Map of Public Ultrasound Dataset Resources</text>
  <text x="74" y="112" class="subtitle">Ready public or request-access resources, grouped by clinical domain and by the richest human-AI collaboration signal they can currently support.</text>

  <!-- Layout:
       left label area x=74..390
       matrix x=400..1600, six columns each 200
       header y=150..198
       rows y=200..800, five rows each 120
  -->

  <!-- Column headers -->
  <g>
    <rect x="400" y="150" width="200" height="48" rx="10" fill="#eef6ff" stroke="#dbe4ea"/>
    <rect x="600" y="150" width="200" height="48" rx="10" fill="#ecfbf6" stroke="#dbe4ea"/>
    <rect x="800" y="150" width="200" height="48" rx="10" fill="#fff0f5" stroke="#dbe4ea"/>
    <rect x="1000" y="150" width="200" height="48" rx="10" fill="#f5efff" stroke="#dbe4ea"/>
    <rect x="1200" y="150" width="200" height="48" rx="10" fill="#fff7e8" stroke="#dbe4ea"/>
    <rect x="1400" y="150" width="200" height="48" rx="10" fill="#eefbfc" stroke="#dbe4ea"/>
    <text x="500" y="180" text-anchor="middle" class="domain">Cardiac</text>
    <text x="700" y="180" text-anchor="middle" class="domain">Fetal / OB</text>
    <text x="900" y="180" text-anchor="middle" class="domain">Breast</text>
    <text x="1100" y="180" text-anchor="middle" class="domain">Thyroid</text>
    <text x="1300" y="180" text-anchor="middle" class="domain">POCUS</text>
    <text x="1500" y="180" text-anchor="middle" class="domain">General US VLM</text>
  </g>

  <!-- Row labels -->
  <g>
    <text x="74" y="230" class="row-title">5. Interaction traces</text>
    <text x="74" y="252" class="row-desc">AI suggestions, human corrections, feedback, outcomes</text>
    <text x="74" y="350" class="row-title">4. Skill / workflow</text>
    <text x="74" y="372" class="row-desc">Acquisition process, protocol, operator behavior</text>
    <text x="74" y="470" class="row-title">3. Language / reasoning</text>
    <text x="74" y="492" class="row-desc">Reports, VQA, captions, multimodal reasoning</text>
    <text x="74" y="590" class="row-title">2. Measurement / quality</text>
    <text x="74" y="612" class="row-desc">Biometrics, contours, quality scores, view checks</text>
    <text x="74" y="710" class="row-title">1. Labels / masks</text>
    <text x="74" y="732" class="row-desc">Classification labels, masks, boundaries</text>
  </g>

  <!-- Matrix cells -->
  <g>
    <!-- row 5 -->
    <rect x="400" y="200" width="200" height="120" class="cell"/>
    <rect x="600" y="200" width="200" height="120" class="cell-alt"/>
    <rect x="800" y="200" width="200" height="120" class="cell"/>
    <rect x="1000" y="200" width="200" height="120" class="cell-alt"/>
    <rect x="1200" y="200" width="200" height="120" class="cell"/>
    <rect x="1400" y="200" width="200" height="120" class="cell-alt"/>
    <!-- row 4 -->
    <rect x="400" y="320" width="200" height="120" class="cell-alt"/>
    <rect x="600" y="320" width="200" height="120" class="cell"/>
    <rect x="800" y="320" width="200" height="120" class="cell-alt"/>
    <rect x="1000" y="320" width="200" height="120" class="cell"/>
    <rect x="1200" y="320" width="200" height="120" class="cell-alt"/>
    <rect x="1400" y="320" width="200" height="120" class="cell"/>
    <!-- row 3 -->
    <rect x="400" y="440" width="200" height="120" class="cell"/>
    <rect x="600" y="440" width="200" height="120" class="cell-alt"/>
    <rect x="800" y="440" width="200" height="120" class="cell"/>
    <rect x="1000" y="440" width="200" height="120" class="cell-alt"/>
    <rect x="1200" y="440" width="200" height="120" class="cell"/>
    <rect x="1400" y="440" width="200" height="120" class="cell-alt"/>
    <!-- row 2 -->
    <rect x="400" y="560" width="200" height="120" class="cell-alt"/>
    <rect x="600" y="560" width="200" height="120" class="cell"/>
    <rect x="800" y="560" width="200" height="120" class="cell-alt"/>
    <rect x="1000" y="560" width="200" height="120" class="cell"/>
    <rect x="1200" y="560" width="200" height="120" class="cell-alt"/>
    <rect x="1400" y="560" width="200" height="120" class="cell"/>
    <!-- row 1 -->
    <rect x="400" y="680" width="200" height="120" class="cell"/>
    <rect x="600" y="680" width="200" height="120" class="cell-alt"/>
    <rect x="800" y="680" width="200" height="120" class="cell"/>
    <rect x="1000" y="680" width="200" height="120" class="cell-alt"/>
    <rect x="1200" y="680" width="200" height="120" class="cell"/>
    <rect x="1400" y="680" width="200" height="120" class="cell-alt"/>
  </g>

  <!-- Non-public model-driven gap -->
  <rect x="614" y="224" width="172" height="32" class="gap"/>
  <text x="700" y="245" text-anchor="middle" class="gap-text">Sonomate / PULSE gap</text>

  <!-- Ready resources only -->
  <!-- Cardiac -->
  <rect x="420" y="582" width="160" height="32" fill="#b9d7ff" class="chip"/>
  <text x="500" y="603" text-anchor="middle" class="chip-text">EchoNet-Dynamic</text>
  <rect x="420" y="621" width="160" height="32" fill="#b9d7ff" class="chip"/>
  <text x="500" y="642" text-anchor="middle" class="chip-text">EchoNet-Pediatric</text>
  <rect x="452" y="704" width="96" height="32" fill="#b9d7ff" class="chip"/>
  <text x="500" y="725" text-anchor="middle" class="chip-text">CAMUS</text>

  <!-- Fetal -->
  <rect x="626" y="344" width="148" height="32" fill="#9ce8d4" class="chip"/>
  <text x="700" y="365" text-anchor="middle" class="chip-text">Fetal Planes DB</text>
  <rect x="658" y="582" width="84" height="32" fill="#9ce8d4" class="chip"/>
  <text x="700" y="603" text-anchor="middle" class="chip-text">HC18</text>

  <!-- Breast -->
  <rect x="836" y="582" width="128" height="32" fill="#e9a3b7" class="chip"/>
  <text x="900" y="603" text-anchor="middle" class="chip-text">BUS-UCLM</text>
  <rect x="854" y="704" width="92" height="32" fill="#e9a3b7" class="chip"/>
  <text x="900" y="725" text-anchor="middle" class="chip-text">BUSI</text>
  <rect x="846" y="742" width="108" height="32" fill="#e9a3b7" class="chip"/>
  <text x="900" y="763" text-anchor="middle" class="chip-text">OASBUD</text>

  <!-- Thyroid -->
  <rect x="1037" y="582" width="126" height="32" fill="#c8b2f1" class="chip"/>
  <text x="1100" y="603" text-anchor="middle" class="chip-text">TN-SCUI2020</text>
  <rect x="1056" y="621" width="88" height="32" fill="#c8b2f1" class="chip"/>
  <text x="1100" y="642" text-anchor="middle" class="chip-text">TN3K</text>

  <!-- POCUS -->
  <rect x="1235" y="344" width="130" height="32" fill="#ffd083" class="chip"/>
  <text x="1300" y="365" text-anchor="middle" class="chip-text">COVID-BLUES</text>
  <rect x="1223" y="464" width="154" height="32" fill="#ffd083" class="chip"/>
  <text x="1300" y="485" text-anchor="middle" class="chip-text">COVID-19 POCUS</text>
  <rect x="1211" y="704" width="178" height="32" fill="#ffd083" class="chip"/>
  <text x="1300" y="725" text-anchor="middle" class="chip-text">Nerve Segmentation</text>

  <!-- General -->
  <rect x="1441" y="464" width="118" height="32" fill="#9edce2" class="chip"/>
  <text x="1500" y="485" text-anchor="middle" class="chip-text">U2-BENCH</text>
  <rect x="1454" y="704" width="92" height="32" fill="#b8c9d6" class="chip"/>
  <text x="1500" y="725" text-anchor="middle" class="chip-text">PICMUS</text>

  <!-- Legend and interpretation -->
  <g transform="translate(74 820)">
    <rect x="0" y="0" width="620" height="62" rx="12" fill="#ffffff" stroke="#dfe8ee"/>
    <text x="18" y="24" class="legend-title">Encoding</text>
    <rect x="108" y="12" width="38" height="22" fill="#b9d7ff" class="chip"/>
    <text x="160" y="29" class="legend">ready public or request-access dataset</text>
    <rect x="108" y="38" width="38" height="18" class="gap"/>
    <text x="160" y="53" class="legend">important non-public data gap highlighted by recent models</text>
  </g>

  <text x="735" y="840" class="small">Interpretation: ready public ultrasound resources cluster around labels, masks, measurements, and benchmark tasks.</text>
  <text x="735" y="862" class="small">Scan-time interaction, speech, gaze, feedback, and human correction traces remain scarce.</text>
</svg>
